<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CRM | Maya Representações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --azul-escuro: #003366;
            --dourado-laranja: #FF9900;
        }
        body { background-color: #F0F0F0; }
        .bg-maya-dark { background-color: var(--azul-escuro); }
        .text-maya-gold { color: var(--dourado-laranja); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 border-t-4 border-orange-500">
        <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">Acesso ao CRM</h1>
        <form>
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2">Usuário</label>
                <input type="text" class="w-full p-3 border rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2">Senha</label>
                <input type="password" class="w-full p-3 border rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <button class="w-full bg-maya-dark text-white font-bold py-3 rounded-lg hover:bg-blue-900 transition">
                ENTRAR
            </button>
        </form>
        <p class="text-center mt-4 text-xs text-gray-400 uppercase tracking-widest">Maya Representações</p>
    </div>
</body>
</html>
